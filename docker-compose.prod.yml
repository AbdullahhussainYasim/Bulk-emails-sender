version: '3.8'

services:
  backend:
    build: ./backend
    container_name: cold_email_backend_prod
    restart: always
    ports:
      - "80:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - FERNET_KEY=${FERNET_KEY}
      - SECRET_KEY=${SECRET_KEY}
    
  worker:
    build: ./backend
    container_name: cold_email_worker_prod
    restart: always
    command: celery -A app.celery_app worker -B --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - FERNET_KEY=${FERNET_KEY}
      - SECRET_KEY=${SECRET_KEY}
